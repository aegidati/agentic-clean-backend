name: Starter CI

on:
  push:
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f AUDIT-REPORT.md
          test -f starter.manifest.yaml

      - name: Verify app structure
        run: |
          test -d app

      - name: Detect unresolved placeholders
        run: |
          if grep -R "<STARTER_" .; then
            echo "Unresolved template placeholders found"
            exit 1
          fi
